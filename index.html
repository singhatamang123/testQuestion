<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Master • 20 Marks Test</title>

    <!-- PWA Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.3/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .question-card { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .option-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .option-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(59 130 246); }
        .option-btn.selected { background-color: #3b82f6; color: white; border-color: #3b82f6; }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- jsPDF for PDF Export - Latest reliable version -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.3/jspdf.umd.min.js"></script>
    <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js")
      .then(() => console.log("Service Worker registered"));
  }
</script>

    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">

    <nav class="bg-white border-b shadow-md sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-8 py-6 grid grid-cols-3 items-center">
    
    <!-- Left side: Logo -->
    <div class="flex justify-start">
      <!-- <img src="/logo-removebg-preview.png" 
           alt="Alchemist Academy Logo" 
           class="w-16 h-16 rounded-full shadow-md"> -->
    </div>

    <!-- Center: School Name -->
    <div class="text-center">
      <h1 class="title-font text-3xl font-bold tracking-tight text-blue-700">
        Alchemist Academy
      </h1>
    </div>

    <!-- Right side: Aptitude Test -->
    <div class="flex justify-end">
      <span class="text-xl font-semibold text-slate-700">
        Aptitude Test
      </span>
    </div>

  </div>
</nav>


    <!-- Timer (Global - visible only during quiz) -->
    <div id="timer-display" class="hidden fixed top-4 right-6 bg-white shadow-lg px-5 py-2 rounded-3xl text-xl font-mono font-semibold text-red-600 border z-50">
        ⏱️ <span id="time-left">30:00</span>
    </div>

    <div class="max-w-4xl mx-auto px-6 py-8">

        <!-- CLASS SELECTION SCREEN -->
        <div id="class-screen">
            <div class="flex flex-col items-center justify-center min-h-[70vh] text-center">
                <h2 class="title-font text-5xl font-semibold tracking-tighter text-slate-900 mb-3">
                    Select Your Class
                </h2>
                <p class="text-slate-600 text-lg mb-10">Choose class from 4 to 9</p>

                <div id="class-buttons" class="grid grid-cols-3 md:grid-cols-6 gap-4 max-w-2xl">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

        <!-- STUDENT INFO SCREEN -->
        <div id="info-screen" class="hidden">
            <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-10 mt-20">
                <h2 class="text-3xl font-semibold text-center mb-8">Student Information</h2>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-600 mb-2">Your Full Name</label>
                    <input id="student-name" type="text" 
                           class="w-full px-5 py-4 border border-slate-300 rounded-3xl focus:outline-none focus:border-blue-500 text-lg"
                           placeholder="Enter your full name">
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-medium text-slate-600 mb-2">Selected Class</label>
                    <div id="selected-class-display" 
                         class="px-5 py-4 bg-blue-50 text-blue-700 font-semibold rounded-3xl text-center text-xl">
                    </div>
                </div>

                <button onclick="startQuiz()" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-3xl text-xl font-semibold transition-colors">
                    Start 20 Marks Test
                </button>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="hidden">
            <div class="question-card bg-white rounded-3xl shadow-xl p-8 md:p-10">
                <div class="flex justify-between items-center mb-6">
                    <div id="subject-badge" class="inline-flex items-center gap-2 px-5 py-2 bg-blue-50 text-blue-700 rounded-2xl text-sm font-semibold"></div>
                    <div id="student-info-bar" class="text-sm text-slate-500 font-medium"></div>
                </div>
                
                <h3 id="question-text" class="text-2xl font-medium text-slate-900 leading-tight mb-8"></h3>
                
                <div id="options-container" class="grid grid-cols-1 gap-4 mb-10"></div>

                <div class="flex justify-between items-center">
                    <button onclick="prevQuestion()" id="prev-btn"
                            class="flex items-center gap-2 px-6 py-3 text-slate-500 hover:text-slate-700 font-medium rounded-2xl transition-colors">
                        ← Previous
                    </button>
                    
                    <button onclick="nextQuestion()" id="next-btn"
                            class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-3xl font-semibold transition-colors">
                        <span id="next-text">→</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="results-screen" class="hidden flex flex-col items-center justify-center min-h-[70vh]">
            <div class="bg-white rounded-3xl shadow-2xl max-w-lg w-full p-10 text-center">
                <h2 class="text-4xl font-semibold mb-2 title-font">Test Completed</h2>
                <p id="result-student-name" class="text-slate-500 mb-6 text-lg"></p>
                
                <div class="flex justify-center mb-8">
                    <div class="relative w-40 h-40">
                        <svg class="w-40 h-40 -rotate-12" viewBox="0 0 42 42">
                            <circle cx="21" cy="21" r="15" fill="none" stroke="#e2e8f0" stroke-width="6"></circle>
                            <circle id="score-circle" cx="21" cy="21" r="15" fill="none" 
                                    stroke="#3b82f6" stroke-width="6" stroke-dasharray="94.2" 
                                    stroke-dashoffset="94.2" stroke-linecap="round"></circle>
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <div id="score-text" class="text-7xl font-bold text-blue-600 title-font">0</div>
                            <div class="text-sm font-medium text-slate-400 -mt-1">/ 20</div>
                        </div>
                    </div>
                </div>

                <div id="result-message" class="text-2xl font-medium mb-8"></div>
                
                <div class="flex justify-center gap-10 mb-10">
                    <div class="text-center">
                        <div id="correct-count" class="text-4xl font-semibold text-emerald-600">0</div>
                        <div class="text-xs text-slate-500">CORRECT</div>
                    </div>
                    <div class="text-center">
                        <div id="wrong-count" class="text-4xl font-semibold text-red-500">0</div>
                        <div class="text-xs text-slate-500">WRONG</div>
                    </div>
                </div>

                <button onclick="exportResultPDF()" 
                        class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-3xl mb-3 flex items-center justify-center gap-2">
                    📄 Download Result as PDF
                </button>

                <button onclick="restartQuiz()" 
                        class="w-full py-4 bg-blue-600 text-white font-semibold rounded-3xl mb-3">
                    Take Another Test
                </button>
                
                <button onclick="goToClassSelection()" 
                        class="w-full py-4 border border-slate-300 text-slate-700 font-medium rounded-3xl">
                    Choose Different Class
                </button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script src="js/pdf-export.js"></script>
</body>
</html>
